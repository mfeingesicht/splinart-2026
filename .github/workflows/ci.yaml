name: ci

on:
  pull_request:
    branches: [main]

jobs:
  precommit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v3
      - uses: pre-commit/action@v3.0.1

  linter:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true

      - name: check ruff
        run: pixi run -e linter ruff check .
      - name: check pylint
        run: pixi run -e linter pylint splinart

  pytest:
    needs: [precommit, linter]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v3

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          cache: true

      - name: Install fortran compiler
        if: runner.os == 'macOS'
        run: pixi add fortran-compiler

      - name: Run tests
        run: pixi run pytest

  build:
    needs: [precommit, linter]
    runs-on: ubuntu-latest
#    runs-on: ${{ matrix.os }}
#    strategy:
#      matrix:
#        python-version: [ 3.8, 3.9, "3.10", 3.11,  3.12 ]
#        os:
#          - ubuntu-latest
#          - macos-latest
#          - windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest
        pip install .

    - name: Test with pytest
      run: |
        pytest
