{% set version = "0.2.0" %}

package:
  name: splinart_2026_mf
  version: {{ version }}

source:
  git_url: https://github.com/mfeingesicht/splinart-2026.git
  git_rev: v{{ version }}

build:
  number: 0
  script: "{{PYTHON}} -m pip install . --no-deps -vv"
  noarch: python

requirements:
  build:
    - python>=3.8
    - setuptools
  run:
    - python>=3.8
    - numpy
    - matplotlib

test:
  imports:
    - splinart

about:
  home: https://github.com/mfeingesicht/splinart-2026
  license: BSD
  license_family: BSD
  summary: "spline art generator"
  description: "spline art generator"

extra:
  recipe-maintainers: "maxime.feingesicht@lisa.ipsl.fr"
